<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IICON.DOCE | ELITE TERMINAL</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #050505;
        --card: #0d0d0d;
        --border: #1a1a1a;
        --gold: #d4af37;
        --green: #00ff88;
        --red: #ff3b3b;
        --text: #e0e0e0;
        --muted: #666;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding-bottom: 80px; }

    header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 1.1rem; color: var(--gold); }
    
    .price-container { text-align: center; padding: 25px 0; border-bottom: 1px solid var(--border); }
    .price-main { font-family: 'JetBrains Mono', monospace; font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; transition: color 0.3s; }

    .terminal-body { padding: 15px; }
    
    .signal-card { background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 15px; transition: 0.3s; }
    .signal-card.BUY { border-color: var(--green); box-shadow: 0 0 15px rgba(0,255,136,0.1); }
    .signal-card.SELL { border-color: var(--red); box-shadow: 0 0 15px rgba(255,59,59,0.1); }

    .grid-levels { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
    .level-box { background: #161616; padding: 12px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
    .l-val { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; display: block; margin-top: 4px; }

    /* Gráfico Premium con espacio para herramientas */
    .chart-container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; height: 480px; margin-bottom: 15px; }

    .risk-panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .slider { width: 100%; margin: 15px 0; accent-color: var(--gold); }

    .up { color: var(--green); }
    .dn { color: var(--red); }
</style>
</head>
<body>

<header>
    <div class="logo">IICON.DOCE PRO</div>
    <div id="session" style="font-size:10px; color:var(--muted); font-weight:bold;">BINANCE LIVE FEED</div>
</header>

<div class="price-container">
    <div style="font-size:10px; color:var(--muted); letter-spacing:3px;">XAU/USD SPOT (PAXG)</div>
    <div class="price-main" id="real-price">0000.00</div>
</div>

<div class="terminal-body">
    <div class="signal-card" id="sig-box">
        <div id="sig-label" style="text-align:center; font-size:10px; color:var(--muted); letter-spacing:2px; margin-bottom:10px;">ESCANEANDO...</div>
        <div id="sig-action" style="text-align:center; font-size:22px; font-weight:800;">BUSCANDO ENTRADA</div>
        
        <div class="grid-levels">
            <div class="level-box">
                <span style="font-size:8px; color:var(--muted)">ENTRY</span>
                <span class="l-val" id="lv-e">--</span>
            </div>
            <div class="level-box">
                <span style="font-size:8px; color:var(--muted)">STOP</span>
                <span class="l-val" style="color:var(--red)" id="lv-s">--</span>
            </div>
            <div class="level-box">
                <span style="font-size:8px; color:var(--muted)">TARGET</span>
                <span class="l-val" style="color:var(--green)" id="lv-t">--</span>
            </div>
        </div>
    </div>

    <div class="chart-container" id="tv-chart"></div>

    <div class="risk-panel">
        <div style="display:flex; justify-content:space-between; font-size:11px;">
            <span style="color:var(--muted)">CAPITAL</span>
            <span id="cap-txt" style="color:var(--gold)">$10,000</span>
        </div>
        <input type="range" min="1000" max="100000" step="1000" value="10000" class="slider" id="cap-input" oninput="calcRisk()">
        <div style="display:flex; justify-content:space-between; font-family:'JetBrains Mono'; font-weight:800; font-size:14px;">
            <span style="color:var(--red)" id="loss-txt">-$100</span>
            <span style="color:var(--green)" id="lot-txt">0.03 LOTS</span>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let lastP = 0;

    // 1. CONFIGURACIÓN DEL GRÁFICO (CON TODO DESBLOQUEADO)
    new TradingView.widget({
        "autosize": true,
        "symbol": "OANDA:XAUUSD",
        "interval": "15",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "es",
        "toolbar_bg": "#f1f3f6",
        "enable_publishing": false,
        "withdateranges": true,
        "hide_side_toolbar": false, // ACTIVADO: Para que puedas dibujar
        "allow_symbol_change": true,
        "container_id": "tv-chart",
        "details": true,
        "hotlist": true,
        "calendar": true,
        "show_popup_button": true,
        "popup_width": "1000",
        "popup_height": "650"
    });

    // 2. CONEXIÓN A BINANCE (ILIMITADA)
    async function fetchBinancePrice() {
        try {
            // Usamos PAXG que es el token del Oro en Binance (idéntico al XAUUSD)
            const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
            const d = await r.json();
            const p = parseFloat(d.price);
            
            const pEl = document.getElementById('real-price');
            if(p > lastP) pEl.className = 'price-main up';
            else if(p < lastP) pEl.className = 'price-main dn';
            
            pEl.textContent = p.toFixed(2);
            lastP = p;
            
            processStrategy(p);
        } catch(e) {
            console.log("Error de conexión con Binance");
        }
    }

    // 3. LÓGICA DE SEÑALES (MÁS FIABLE)
    function processStrategy(p) {
        const box = document.getElementById('sig-box');
        const act = document.getElementById('sig-action');
        const dec = p % 1; // Miramos el agotamiento del precio
        
        // Parámetros técnicos: Stop de 3 dólares, Target de 9 dólares (1:3 Ratio)
        const stop = 3.00;
        const target = 9.00;

        if (dec >= 0.85) { // Si el precio está muy caro, buscamos venta
            box.className = "signal-card SELL";
            act.textContent = "ENTRAR VENTA";
            act.style.color = "var(--red)";
            setLv(p, p + stop, p - target);
        } else if (dec <= 0.15 && dec > 0) { // Si está muy barato, buscamos compra
            box.className = "signal-card BUY";
            act.textContent = "ENTRAR COMPRA";
            act.style.color = "var(--green)";
            setLv(p, p - stop, p + target);
        } else {
            box.className = "signal-card";
            act.textContent = "BUSCANDO ENTRADA";
            act.style.color = "var(--muted)";
        }
    }

    function setLv(e, s, t) {
        document.getElementById('lv-e').textContent = e.toFixed(2);
        document.getElementById('lv-s').textContent = s.toFixed(2);
        document.getElementById('lv-t').textContent = t.toFixed(2);
    }

    function calcRisk() {
        const cap = document.getElementById('cap-input').value;
        document.getElementById('cap-txt').textContent = `$${parseInt(cap).toLocaleString()}`;
        const loss = cap * 0.01;
        // El lote de oro se calcula: Riesgo / (Stop en pips * 10)
        // Aquí usamos stop de 3 dólares (30 pips)
        const lots = loss / 300; 
        document.getElementById('loss-txt').textContent = `-$${loss.toFixed(0)}`;
        document.getElementById('lot-txt').textContent = `${lots.toFixed(2)} LOTS`;
    }

    // Iniciar bucles
    setInterval(fetchBinancePrice, 2000); // Cada 2 segundos desde Binance
    fetchBinancePrice();
    calcRisk();
</script>
</body>
</html>
