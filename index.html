<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IICON.DOCE | K-EDITION IA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #040608; --card: #0c1117; --border: #1e293b;
        --gold: #d4af37; --green: #00ff88; --red: #ff3b3b; --blue: #00d9ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
    body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; padding: 15px; }

    /* --- DASHBOARD KASANGO STYLE --- */
    .k-container {
        max-width: 1100px; margin: 0 auto; background: var(--card);
        border: 1px solid var(--border); border-radius: 25px; padding: 30px;
        box-shadow: 0 0 100px rgba(0,0,0,1); position: relative;
    }

    .k-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
    .k-logo { font-size: 2rem; font-weight: 900; color: var(--gold); letter-spacing: 8px; }
    .k-status { font-size: 10px; color: var(--green); letter-spacing: 2px; text-shadow: 0 0 10px var(--green); }

    /* --- SELECTOR DIRECCIÓN (NUEVO) --- */
    .mode-selector { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
    .btn-mode { padding: 10px 30px; border-radius: 30px; border: 1px solid var(--border); background: #111; color: #555; cursor: pointer; font-weight: 900; font-size: 12px; transition: 0.3s; }
    .btn-mode.active-buy { border-color: var(--green); color: var(--green); box-shadow: 0 0 15px rgba(0,255,136,0.2); }
    .btn-mode.active-sell { border-color: var(--red); color: var(--red); box-shadow: 0 0 15px rgba(255,59,59,0.2); }

    /* --- DISPLAY CENTRAL --- */
    .main-display { text-align: center; margin-bottom: 30px; }
    #k-price { font-family: 'JetBrains Mono'; font-size: 6rem; font-weight: 800; letter-spacing: -7px; line-height: 1; margin-bottom: 20px; }
    
    .signal-orb {
        width: 240px; height: 240px; border: 6px solid #111; border-radius: 50%;
        margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, transparent 80%);
        transition: 0.5s;
    }
    .orb-buy { border-color: var(--green) !important; box-shadow: 0 0 60px rgba(0,255,136,0.2); }
    .orb-sell { border-color: var(--red) !important; box-shadow: 0 0 60px rgba(255,59,59,0.2); }

    .score-num { font-size: 60px; font-weight: 900; line-height: 1; }
    .score-txt { font-size: 14px; font-weight: 900; letter-spacing: 3px; margin-top: 10px; }

    /* --- INFO GRID --- */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 30px; }
    .i-box { background: #080d14; border: 1px solid var(--border); padding: 15px; border-radius: 15px; text-align: center; }
    .i-label { font-size: 8px; color: #444; margin-bottom: 5px; }
    .i-val { font-family: 'JetBrains Mono'; font-size: 16px; font-weight: 800; }

    /* --- RADAR ZONE --- */
    .zone-alert { background: #111; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border); font-size: 12px; font-weight: 900; margin-bottom: 20px; }
    .zone-fire { background: var(--green); color: #000; box-shadow: 0 0 30px var(--green); }

    /* --- CHART --- */
    .chart-box { height: 400px; border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
</style>
</head>
<body>

<div class="k-container">
    <div class="k-header">
        <div class="k-logo">IICON.DOCE</div>
        <div class="k-status">● LIVE AI NODE CONNECTED</div>
    </div>

    <div class="mode-selector">
        <button class="btn-mode active-buy" id="mode-buy" onclick="setMode('BUY')">LONG MODE</button>
        <button class="btn-mode" id="mode-sell" onclick="setMode('SELL')">SHORT MODE</button>
    </div>

    <div class="main-display">
        <div id="k-price">0000.00</div>
        <div class="signal-orb" id="orb">
            <div class="score-num" id="score">0/7</div>
            <div class="score-txt" id="status">ANALYZING</div>
        </div>
    </div>

    <div class="zone-alert" id="zone-msg">ESPERANDO ZONA DE REACCIÓN...</div>

    <div class="info-grid">
        <div class="i-box"><div class="i-label">PUNTO DE ENTRADA</div><div class="i-val" id="lv-e">--</div></div>
        <div class="i-box" style="border-color:var(--red)"><div class="i-label">STOP LOSS</div><div class="i-val" style="color:var(--red)" id="lv-s">--</div></div>
        <div class="i-box" style="border-color:var(--green)"><div class="i-label">TAKE PROFIT</div><div class="i-val" style="color:var(--green)" id="lv-t">--</div></div>
    </div>

    <div class="chart-box" id="tv_chart"></div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentMode = 'BUY';
    let lastP = 0;
    let audio = new (window.AudioContext || window.webkitAudioContext)();

    new TradingView.widget({
        "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15", "theme": "dark",
        "container_id": "tv_chart", "style": "1", "timezone": "Etc/UTC"
    });

    function setMode(m) {
        currentMode = m;
        document.getElementById('mode-buy').className = m === 'BUY' ? 'btn-mode active-buy' : 'btn-mode';
        document.getElementById('mode-sell').className = m === 'SELL' ? 'btn-mode active-sell' : 'btn-mode';
    }

    async function tick() {
        try {
            const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
            const d = await r.json();
            const p = parseFloat(d.price);
            document.getElementById('k-price').textContent = p.toFixed(2);
            document.getElementById('k-price').style.color = p >= lastP ? "var(--green)" : "var(--red)";
            lastP = p;
            kasangoLogic(p);
        } catch(e){}
    }

    function kasangoLogic(p) {
        const hr = new Date().getUTCHours();
        const step = 50;
        const target = Math.round(p / step) * step;
        const dist = Math.abs(p - target);
        
        // Lógica de puntuación
        let s = 3; // Base
        if((hr >= 7 && hr < 16) || (hr >= 13 && hr < 22)) s += 2; // Session
        if(dist < 5) s += 2; // Psych Zone

        document.getElementById('score').textContent = s + "/7";
        const orb = document.getElementById('orb');
        const stat = document.getElementById('status');
        const zone = document.getElementById('zone-msg');

        if(s >= 7) {
            orb.className = "signal-orb " + (currentMode === 'BUY' ? "orb-buy" : "orb-sell");
            stat.textContent = currentMode + " SIGNAL";
            stat.style.color = currentMode === 'BUY' ? "var(--green)" : "var(--red)";
            zone.className = "zone-alert zone-fire";
            zone.textContent = "¡ZONA DE ALTA REACCIÓN IDENTIFICADA!";
            beep();
        } else {
            orb.className = "signal-orb";
            stat.textContent = "SCANNING";
            stat.style.color = "#444";
            zone.className = "zone-alert";
            zone.textContent = "DISTANCIA A NIVEL: " + dist.toFixed(2) + " PIPS";
        }

        document.getElementById('lv-e').textContent = target.toFixed(2);
        document.getElementById('lv-s').textContent = (currentMode === 'BUY' ? target - 2.50 : target + 2.50).toFixed(2);
        document.getElementById('lv-t').textContent = (currentMode === 'BUY' ? target + 7.50 : target - 7.50).toFixed(2);
    }

    function beep() {
        let o = audio.createOscillator(); let g = audio.createGain();
        o.connect(g); g.connect(audio.destination);
        o.frequency.value = 1000; g.gain.value = 0.03;
        o.start(); o.stop(audio.currentTime + 0.1);
    }

    setInterval(tick, 2000); tick();
</script>
</body>
</html>
