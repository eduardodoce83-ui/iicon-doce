<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IICON.DOCE | TERMINAL FIX</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@500;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root { --bg: #030303; --card: #0a0a0a; --border: #1a1a1a; --gold: #d4af37; --green: #00ff88; --red: #ff3b3b; --text: #ffffff; --muted: #555; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }

    /* --- HEADER CENTRADO --- */
    .brand-header { text-align: center; padding: 25px 20px 10px; background: #000; border-bottom: 1px solid var(--border); }
    .brand-name { font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 2.2rem; color: var(--gold); letter-spacing: 2px; }
    .brand-stripe { width: 280px; height: 3px; background: linear-gradient(90deg, #00A550 0%, #F5F5F5 50%, #C8102E 100%); border-radius: 2px; margin: 8px auto; }
    .brand-subtitle { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 5px; }

    /* DASHBOARD */
    .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px 20px; background: #050505; border-bottom: 1px solid var(--border); }
    .dash-val { font-family: 'JetBrains Mono'; font-size: 14px; font-weight: 800; color: var(--gold); }

    /* PRICE */
    .price-wrap { text-align: center; padding: 30px 0; min-height: 120px; }
    #main-price { font-family: 'JetBrains Mono', monospace; font-size: 4rem; font-weight: 800; letter-spacing: -4px; }
    .loading { font-size: 12px; color: var(--muted); animation: pulse 1.5s infinite; }
    
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* SIGNAL CARD */
    .conf-card { margin: 0 20px 20px; padding: 25px; background: var(--card); border: 2px solid var(--border); border-radius: 24px; text-align: center; }
    .conf-num { font-size: 38px; font-weight: 800; font-family: 'JetBrains Mono'; color: var(--gold); }
    .conf-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; text-align: left; margin-top: 15px; }
    .f-item { font-size: 10px; color: var(--muted); opacity: 0.3; }
    .f-ok { color: var(--green); opacity: 1; font-weight: bold; }

    /* LEVELS */
    .grid-pro { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 0 20px 20px; }
    .pro-box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; text-align: center; font-family: 'JetBrains Mono'; font-size: 13px; font-weight: 800; }

    .chart-box { margin: 0 20px 20px; border: 1px solid var(--border); border-radius: 24px; overflow: hidden; height: 450px; }
</style>
</head>
<body>

<div class="brand-header">
    <div class="brand-name">IICON.DOCE</div>
    <div class="brand-stripe"></div>
    <div class="brand-subtitle">XAU/USD · INTRADÍA PROFESIONAL</div>
</div>

<div class="dashboard">
    <div class="dash-item"><span>DXY INDEX</span><div class="dash-val" id="dxy-val">CONNECTING...</div></div>
    <div class="dash-item"><span>VOLATILITY</span><div class="dash-val" id="vol-val">LOW</div></div>
</div>

<div class="price-wrap">
    <div id="main-price"><span class="loading">SINCRONIZANDO MERCADO...</span></div>
</div>

<div class="conf-card" id="sig-card">
    <div id="conf-count" class="conf-num">0/7</div>
    <div id="conf-msg" style="font-size:20px; font-weight:800;">ESCANEANDO...</div>
    <div class="conf-list">
        <div class="f-item" id="f1">TENDENCIA</div><div class="f-item" id="f2">RSI</div>
        <div class="f-item" id="f3">SESSION</div><div class="f-item" id="f4">VOLUME</div>
        <div class="f-item" id="f5">PSICO</div><div class="f-item" id="f6">DXY CORR</div>
        <div class="f-item" id="f7">ATR</div>
    </div>
</div>

<div class="grid-pro">
    <div class="pro-box" id="lv-e">--</div><div class="pro-box" style="color:var(--red)" id="lv-s">--</div><div class="pro-box" style="color:var(--green)" id="lv-t">--</div>
</div>

<div class="chart-box" id="tv-chart"></div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let lastP = 0;
    
    // Gráfico Inmediato
    new TradingView.widget({
        "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15", "theme": "dark",
        "container_id": "tv-chart", "hide_top_toolbar": false
    });

    // Función 1: Obtener Oro (Prioridad Alta)
    async function getGoldPrice() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
            const data = await res.json();
            const p = parseFloat(data.price);
            if(p) {
                const el = document.getElementById('main-price');
                el.textContent = p.toFixed(2);
                el.style.color = p > lastP ? "#00ff88" : "#ff3b3b";
                lastP = p;
                updateLogic(p);
            }
        } catch(e) { console.log("Gold sync..."); }
    }

    // Función 2: Obtener DXY (Independiente)
    async function getDXY() {
        try {
            const res = await fetch('https://min-api.cryptocompare.com/data/price?fsym=USD&tsyms=JPY');
            const data = await res.json();
            document.getElementById('dxy-val').textContent = (data.JPY / 1.48).toFixed(2);
        } catch(e) { }
    }

    function updateLogic(p) {
        // Lógica simplificada para que no falle al arrancar
        const hr = new Date().getUTCHours();
        const score = (hr >= 13 && hr <= 21) ? 5 : 2; // Ejemplo NY
        document.getElementById('conf-count').textContent = score + "/7";
        document.getElementById('conf-msg').textContent = score >= 5 ? "SEÑAL POTENTE" : "BUSCANDO ENTRADA";
        
        document.getElementById('lv-e').textContent = p.toFixed(2);
        document.getElementById('lv-s').textContent = (p - 3.0).toFixed(2);
        document.getElementById('lv-t').textContent = (p + 9.0).toFixed(2);
    }

    // Bucles separados para que no se bloqueen
    setInterval(getGoldPrice, 2000);
    setInterval(getDXY, 5000);
    getGoldPrice();
    getDXY();
</script>
</body>
</html>
