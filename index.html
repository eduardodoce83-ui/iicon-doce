<script>
const TD_KEY = 38f4424f90b04cf4a38c57a7c12fd03e

let closes = [];
let currentPrice = 0;
let lastPrice = 0;

// ───── DATA MERCADO ─────
async function getMarketData(){
  try{
    const r = await fetch(`https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=1min&outputsize=50&apikey=${TD_KEY}`);
    const d = await r.json();

    if(!d.values) return;

    closes = d.values.map(v => parseFloat(v.close)).reverse();

    currentPrice = closes[closes.length - 1];
    lastPrice = closes[closes.length - 2];

    updatePriceUI();
    updateSignal();

  }catch(e){
    console.log('error data');
  }
}

// ───── RSI ─────
function getRSI(period = 14){
  let gains = 0, losses = 0;

  for(let i = closes.length - period; i < closes.length; i++){
    let diff = closes[i] - closes[i-1];
    if(diff >= 0) gains += diff;
    else losses += Math.abs(diff);
  }

  let rs = gains / (losses || 1);
  return 100 - (100 / (1 + rs));
}

// ───── EMA ─────
function getEMA(period = 50){
  let k = 2 / (period + 1);
  let ema = closes[0];

  for(let i = 1; i < closes.length; i++){
    ema = closes[i] * k + ema * (1 - k);
  }

  return ema;
}

// ───── UI PRECIO ─────
function updatePriceUI(){
  const el = document.getElementById('pc-price');

  el.textContent = '$' + currentPrice.toFixed(2);

  if(currentPrice > lastPrice){
    el.style.color = '#00A550';
  }else if(currentPrice < lastPrice){
    el.style.color = '#C8102E';
  }

  document.getElementById('pc-upd').textContent =
    'Actualizado ' + new Date().toLocaleTimeString('es-ES');
}

// ───── ESTRATEGIA ULTRA PRO ─────
function updateSignal(){

  if(closes.length < 50) return;

  const rsi = getRSI();
  const ema = getEMA();

  const high = Math.max(...closes.slice(-20));
  const low  = Math.min(...closes.slice(-20));

  let trend = currentPrice > ema ? "UP" : "DOWN";

  let signal = "WAIT";
  let entry = currentPrice;
  let sl = 0;
  let tp = 0;

  // 🔥 COMPRA (contra liquidez pero con filtro tendencia)
  if(
    rsi < 30 &&
    currentPrice <= low * 1.001 &&
    trend === "UP"
  ){
    signal = "BUY";
    sl = currentPrice - 20;
    tp = currentPrice + 60;
  }

  // 🔻 VENTA
  if(
    rsi > 70 &&
    currentPrice >= high * 0.999 &&
    trend === "DOWN"
  ){
    signal = "SELL";
    sl = currentPrice + 20;
    tp = currentPrice - 60;
  }

  renderSignal(signal, entry, sl, tp, rsi, trend);
}

// ───── RENDER UI ─────
function renderSignal(signal, entry, sl, tp, rsi, trend){

  const sig = document.getElementById('pc-signal');

  if(signal === "BUY"){
    sig.textContent = "⬆ COMPRA";
    sig.className = "pc-signal BUY";
  }
  else if(signal === "SELL"){
    sig.textContent = "⬇ VENTA";
    sig.className = "pc-signal SELL";
  }
  else{
    sig.textContent = "◆ ESPERAR";
    sig.className = "pc-signal WAIT";
  }

  document.getElementById('lv-entry').textContent = '$'+entry.toFixed(2);
  document.getElementById('lv-sl').textContent = '$'+sl.toFixed(2);
  document.getElementById('lv-tp').textContent = '$'+tp.toFixed(2);

  document.getElementById('as-analysis').style.display = 'block';
  document.getElementById('as-analysis').textContent =
    `RSI: ${rsi.toFixed(1)} | Tendencia: ${trend} | Liquidez detectada`;

}

// ───── CLOCK ─────
function updateClock(){
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('es-ES');
}

// ───── INIT ─────
getMarketData();
setInterval(getMarketData, 5000);

setInterval(updateClock, 1000);
</script>
