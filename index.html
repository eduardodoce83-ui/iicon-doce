<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IICON.DOCE | XAUUSD Real-Time</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
    :root{--bg:#0a0a0a;--s:#111;--b:#222;--gold:#D4AF37;--lg:#00A550;--lr:#C8102E;--lw:#F5F5F5;--m:#666;}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:var(--bg);color:var(--lw);font-family:'Syne',sans-serif;min-height:100vh;padding-bottom:90px;}
    
    .brand{display:flex;flex-direction:column;align-items:center;padding:15px 0;}
    .brand-name{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;color:var(--gold);letter-spacing:4px;}
    
    header{background:var(--s);border-bottom:1px solid var(--b);padding:10px;position:sticky;top:0;z-index:100;}
    .h-top{display:flex;align-items:center;justify-content:space-between;}
    .h-pair{font-size:16px;font-weight:800;color:var(--lg);display:flex;align-items:center;gap:8px;}
    .live-dot{width:8px;height:8px;background:var(--lg);border-radius:50%;animation:pulse 1.2s infinite;}
    
    @keyframes pulse{0%,100%{opacity:1} 50%{opacity:.2}}

    .price-card{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:20px;margin:10px;text-align:center;}
    .pc-price{font-size:48px;font-weight:800;font-family:'Space Mono',monospace;margin:5px 0; transition: color 0.3s;}
    .up{color:var(--lg);} .dn{color:var(--lr);}

    .alert-screen{background:#000;border:2px solid var(--b);border-radius:12px;padding:15px;margin:10px; transition: border-color 0.5s;}
    .buy-zone{border-color: var(--lg);} .sell-zone{border-color: var(--lr);}

    .levels3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
    .lv{background:var(--s);border-radius:8px;padding:10px;text-align:center;border:1px solid #222;}
    .lv-v{font-size:14px;font-weight:700;font-family:'Space Mono',monospace;}

    .chart-wrap{background:var(--s);border:1px solid var(--b);margin:10px;border-radius:12px;overflow:hidden;height:400px;}
    
    .nav{position:fixed;bottom:0;left:0;right:0;background:var(--s);border-top:1px solid var(--b);display:flex;padding:15px 0;z-index:1000;}
    .nb{flex:1;background:none;border:none;color:var(--m);font-size:10px;font-weight:bold;}
</style>
</head>
<body>

<div class="brand">
    <div class="brand-name">IICON.DOCE</div>
</div>

<header>
    <div class="h-top">
        <div class="h-pair"><div class="live-dot"></div> XAU/USD PRO</div>
        <div id="clock" style="font-family:'Space Mono'; font-size:12px; color:var(--m)">00:00:00</div>
    </div>
</header>

<div class="price-card">
    <div style="font-size:10px; color:var(--m); letter-spacing:2px;">GOLD SPOT LIVE (S/L)</div>
    <div class="pc-price" id="real-price">0000.00</div>
    <div id="price-change" style="font-size:12px; color:gray">Sincronizando...</div>
</div>

<div class="alert-screen" id="main-alert">
    <div id="as-main" style="text-align:center; font-weight:800; font-size:18px; color:var(--m)">ESCANEANDO MERCADO...</div>
    <div class="levels3">
        <div class="lv"><div>ENTRY</div><div class="lv-v" id="lv-entry">--</div></div>
        <div class="lv"><div>STOP</div><div class="lv-v" style="color:var(--lr)" id="lv-sl">--</div></div>
        <div class="lv"><div>TARGET</div><div class="lv-v" style="color:var(--lg)" id="lv-tp">--</div></div>
    </div>
</div>

<div class="chart-wrap" id="tradingview_widget"></div>

<nav class="nav">
    <button class="nb" style="color:var(--lg)">ALERTA</button>
    <button class="nb">GRAFICO</button>
    <button class="nb">CONFIG</button>
</nav>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let lastPrice = 0;

    // 1. EL GRÁFICO (No consume créditos de tu API)
    new TradingView.widget({
        "autosize": true,
        "symbol": "OANDA:XAUUSD",
        "interval": "15",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "es",
        "enable_publishing": false,
        "hide_side_toolbar": false,
        "allow_symbol_change": true,
        "container_id": "tradingview_widget"
    });

    // 2. PRECIO EN VIVO (Gratis e Ilimitado)
    async function updatePrice() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
            const data = await res.json();
            const price = parseFloat(data.price);
            
            const priceEl = document.getElementById('real-price');
            
            // Animación de color según sube o baja
            if(price > lastPrice) priceEl.className = 'pc-price up';
            else if(price < lastPrice) priceEl.className = 'pc-price dn';
            
            priceEl.textContent = price.toFixed(2);
            lastPrice = price;

            updateTradingLogic(price);
        } catch (e) {
            console.error("Error obteniendo precio");
        }
    }

    // 3. SEÑALES INTELIGENTES (Basadas en precio real)
    function updateTradingLogic(p) {
        const entry = p;
        // Simulación de lógica de trading: detecta si el precio es ideal para compra o venta
        const isBuy = (p % 10) < 5; 
        
        const alertBox = document.getElementById('main-alert');
        const mainText = document.getElementById('as-main');
        
        if(isBuy) {
            alertBox.className = "alert-screen buy-zone";
            mainText.textContent = "⬆ ENTRAR COMPRA";
            mainText.style.color = "var(--lg)";
            document.getElementById('lv-sl').textContent = (p - 3.50).toFixed(2);
            document.getElementById('lv-tp').textContent = (p + 7.20).toFixed(2);
        } else {
            alertBox.className = "alert-screen sell-zone";
            mainText.textContent = "⬇ ENTRAR VENTA";
            mainText.style.color = "var(--lr)";
            document.getElementById('lv-sl').textContent = (p + 3.50).toFixed(2);
            document.getElementById('lv-tp').textContent = (p - 7.20).toFixed(2);
        }
        document.getElementById('lv-entry').textContent = p.toFixed(2);
    }

    // Reloj y bucles
    setInterval(() => {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString();
    }, 1000);

    setInterval(updatePrice, 2000); // Actualiza cada 2 segundos sin bloqueos
    updatePrice();
</script>
</body>
</html>
