<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IICON.DOCE AI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
  text-align:center;
}

.container{
  padding:20px;
}

.title{
  font-size:28px;
  color:#FFD700;
  margin-bottom:10px;
}

.price{
  font-size:32px;
  margin:20px 0;
  color:#00ffcc;
}

.signal{
  font-size:60px;
  margin:20px 0;
  font-weight:bold;
}

.buy{ color:#00ff88; }
.sell{ color:#ff3b3b; }

.score{
  font-size:22px;
  margin-top:10px;
}

.box{
  background:#111;
  padding:15px;
  margin:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="container">

<div class="title">IICON.DOCE AI - XAU/USD</div>

<div class="price">
Precio: <span id="precio">---</span>
</div>

<div id="signal" class="signal">...</div>

<div class="score">
Fuerza: <span id="score">0</span>%
</div>

<div class="box" id="info">
Conectando...
</div>

</div>

<script>
const API_KEY = "TU_API_KEY_AQUI";

let precioActual = 0;

async function obtenerPrecio() {
  try {
    const res = await fetch(`https://api.twelvedata.com/price?symbol=XAU/USD&apikey=${API_KEY}`);
    const data = await res.json();

    if(data.price){
      precioActual = parseFloat(data.price);
      document.getElementById("precio").innerText = precioActual.toFixed(2);

      generarSenal();
    }

  } catch(e){
    console.log(e);
  }
}

function generarSenal(){

  let score = 0;

  // lógica simple (puedes mejorar luego)
  if(precioActual < 1950) score += 2;
  if(precioActual > 2000) score -= 2;

  let rsi = Math.random()*100;
  if(rsi < 30) score += 2;
  if(rsi > 70) score -= 2;

  let volumen = Math.random();
  if(volumen > 0.7) score += 1;

  let señal = "NEUTRO";

  if(score >= 3){
    señal = "BUY";
    document.getElementById("signal").className = "signal buy";
  }
  else if(score <= -3){
    señal = "SELL";
    document.getElementById("signal").className = "signal sell";
  }
  else{
    document.getElementById("signal").className = "signal";
  }

  document.getElementById("signal").innerText = señal;

  let fuerza = Math.min(Math.abs(score)*20, 100);
  document.getElementById("score").innerText = fuerza;

  document.getElementById("info").innerText =
    "RSI: " + rsi.toFixed(1) + " | Volumen: " + volumen.toFixed(2);
}

setInterval(obtenerPrecio, 5000);
obtenerPrecio();

</script>

</body>
</html>
