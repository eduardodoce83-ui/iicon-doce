<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IICON.DOCE | PRECISION TERMINAL</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
<style>
    :root { --bg:#050505; --card:#0d0d0d; --border:#1a1a1a; --gold:#d4af37; --green:#00ff88; --red:#ff3b3b; --text:#e0e0e0; --muted:#666; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding-bottom: 80px; }

    header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
    .brand-logo { font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 1.1rem; color: var(--gold); }
    .session-badge { padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 700; border: 1px solid var(--border); }
    .open { background: rgba(0,255,136,0.1); color: var(--green); border-color: var(--green); }

    .hero-price { text-align: center; padding: 30px 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .main-price { font-family: 'JetBrains Mono', monospace; font-size: 3.2rem; font-weight: 800; letter-spacing: -2px; }

    .signal-container { margin: 0 20px 20px; padding: 25px; background: var(--card); border: 2px solid var(--border); border-radius: 20px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .sig-status { font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; display: block; text-align: center; }
    
    .grid-levels { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
    .level-card { background: #161616; padding: 15px 10px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
    .l-val { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 800; display: block; margin-top: 5px; }

    .chart-box { margin: 0 20px; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; height: 380px; background: #000; }

    .risk-panel { margin: 20px; padding: 20px; background: var(--card); border-radius: 16px; border: 1px solid var(--border); }
    .slider { width: 100%; margin: 15px 0; accent-color: var(--gold); }

    .up { color: var(--green); text-shadow: 0 0 15px rgba(0,255,136,0.3); }
    .dn { color: var(--red); text-shadow: 0 0 15px rgba(255,59,59,0.3); }
    .buy-signal { border-color: var(--green) !important; box-shadow: 0 0 30px rgba(0,255,136,0.1); }
    .sell-signal { border-color: var(--red) !important; box-shadow: 0 0 30px rgba(255,59,59,0.1); }
</style>
</head>
<body>

<header>
    <div class="brand-logo">IICON.DOCE PRO</div>
    <div id="session-tag" class="session-badge">UTC SYNCING...</div>
</header>

<div class="hero-price">
    <div style="font-size:10px; color:var(--muted); letter-spacing:3px; margin-bottom:5px;">XAUUSD TICKER</div>
    <div class="main-price" id="price">0000.00</div>
</div>

<div class="signal-container" id="sig-card">
    <span class="sig-status" id="sig-msg">ESCANER DE PRECISIÓN ACTIVO</span>
    <div id="main-action" style="font-size: 24px; font-weight: 800; text-align: center; margin-bottom: 20px;">ESPERANDO ZONA</div>
    
    <div class="grid-levels">
        <div class="level-card">
            <span style="font-size:9px; color:var(--muted)">ENTRADA</span>
            <span class="l-val" id="lv-e">--</span>
        </div>
        <div class="level-card">
            <span style="font-size:9px; color:var(--muted)">STOP LOSS</span>
            <span class="l-val" style="color:var(--red)" id="lv-s">--</span>
        </div>
        <div class="level-card">
            <span style="font-size:9px; color:var(--muted)">TARGET (1:2.5)</span>
            <span class="l-val" style="color:var(--green)" id="lv-t">--</span>
        </div>
    </div>
</div>

<div class="chart-box" id="tv-chart"></div>

<div class="risk-panel">
    <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:10px;">
        <span style="color:var(--muted)">GESTIÓN DE RIESGO PROFESIONAL</span>
        <span id="risk-info" style="color:var(--gold)">$10,000 / 1%</span>
    </div>
    <input type="range" min="1000" max="100000" step="1000" value="10000" class="slider" id="cap-input" oninput="updateRisk()">
    <div style="display:flex; justify-content:space-between; font-family:'JetBrains Mono'; font-weight:800;">
        <span id="loss-amt" style="color:var(--red)">-$100</span>
        <span id="lot-amt" style="color:var(--green)">0.03 LOTS</span>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let lastP = 0;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // 1. Gráfico Profesional
    new TradingView.widget({
        "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15", "timezone": "Etc/UTC",
        "theme": "dark", "style": "1", "locale": "es", "container_id": "tv-chart",
        "hide_top_toolbar": true, "withdateranges": false, "save_image": false
    });

    // 2. Lógica de Precisión
    async function getPrecisionData() {
        try {
            const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
            const d = await r.json();
            const p = parseFloat(d.price);
            
            const pEl = document.getElementById('price');
            if(p > lastP) pEl.className = 'main-price up';
            else if(p < lastP) pEl.className = 'main-price dn';
            
            pEl.textContent = p.toFixed(2);
            checkStrategy(p, lastP);
            lastP = p;
            updateSession();
        } catch(e) {}
    }

    function checkStrategy(p, prev) {
        const sigCard = document.getElementById('sig-card');
        const mainAct = document.getElementById('main-action');
        const sigMsg = document.getElementById('sig-msg');
        
        // FILTRO DE REACCIÓN: Solo entra si el precio termina en .00-.15 (Soporte) o .85-.99 (Resistencia)
        const decimals = p % 1;
        const stopSize = 3.00; // 30 Pips de Oro
        const tpSize = 7.50;   // 75 Pips (Ratio 1:2.5)

        if (decimals >= 0.88) {
            // SEÑAL VENTA
            if(mainAct.textContent !== "ENTRAR VENTA") beep(400); 
            sigCard.className = "signal-container sell-signal";
            mainAct.textContent = "ENTRAR VENTA";
            mainAct.style.color = "var(--red)";
            sigMsg.textContent = "PRECISIÓN: ZONA DE REVERSIÓN BAJISTA";
            setLv(p, p + stopSize, p - tpSize);
        } 
        else if (decimals <= 0.12 && decimals > 0) {
            // SEÑAL COMPRA
            if(mainAct.textContent !== "ENTRAR COMPRA") beep(600);
            sigCard.className = "signal-container buy-signal";
            mainAct.textContent = "ENTRAR COMPRA";
            mainAct.style.color = "var(--green)";
            sigMsg.textContent = "PRECISIÓN: ZONA DE REVERSIÓN ALCISTA";
            setLv(p, p - stopSize, p + tpSize);
        }
        else {
            // ESPERA
            sigCard.className = "signal-container";
            mainAct.textContent = "ESPERANDO ZONA";
            mainAct.style.color = "var(--muted)";
            sigMsg.textContent = "FILTRANDO RUIDO DE MERCADO...";
        }
    }

    function setLv(e, s, t) {
        document.getElementById('lv-e').textContent = e.toFixed(2);
        document.getElementById('lv-s').textContent = s.toFixed(2);
        document.getElementById('lv-t').textContent = t.toFixed(2);
    }

    function updateSession() {
        const hour = new Date().getUTCHours();
        const tag = document.getElementById('session-tag');
        if (hour >= 8 && hour < 16) { tag.textContent = "LONDRES ABIERTO"; tag.className = "session-badge open"; }
        else if (hour >= 13 && hour < 21) { tag.textContent = "NEW YORK ABIERTO"; tag.className = "session-badge open"; }
        else { tag.textContent = "SESIÓN ASIÁTICA (BAJO VOLUMEN)"; tag.className = "session-badge"; }
    }

    function updateRisk() {
        const cap = document.getElementById('cap-input').value;
        const loss = cap * 0.01;
        // En oro, 1 lote estándar son $10 por pip. 30 pips de stop = $300 por lote.
        // Lotes = Riesgo / (Stop en pips * 10)
        const lots = loss / (3.00 * 100); 
        document.getElementById('risk-info').textContent = `$${parseInt(cap).toLocaleString()} / 1% RISK`;
        document.getElementById('loss-amt').textContent = `-$${loss.toFixed(0)}`;
        document.getElementById('lot-amt').textContent = `${lots.toFixed(2)} LOTS`;
    }

    function beep(freq) {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq; gain.gain.value = 0.1;
        osc.start(); setTimeout(() => osc.stop(), 200);
    }

    setInterval(getPrecisionData, 2000);
    updateRisk();
    getPrecisionData();
</script>
</body>
</html>
