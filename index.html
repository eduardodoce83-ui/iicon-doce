<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IICON.DOCE | XAUUSD Live</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
    /* Mantenemos tu CSS original que es excelente, solo añadimos una mejora de visibilidad */
    :root{--bg:#0a0a0a;--s:#111;--s2:#1a1a1a;--b:#222;--gold:#D4AF37;--lg:#00A550;--lr:#C8102E;--lw:#F5F5F5;--y:#eab308;--m:#666;--m2:#444;}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:var(--bg);color:var(--lw);font-family:'Syne',sans-serif;min-height:100vh;padding-bottom:90px;}
    
    @keyframes priceFlash{0%{opacity:1}30%{opacity:.3}60%{opacity:1}}
    .brand{display:flex;flex-direction:column;align-items:center;padding:18px 0 4px;}
    .brand-name{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--gold);letter-spacing:6px;}
    .brand-stripe{width:180px;height:3px;background:linear-gradient(90deg,var(--lg),var(--lw),var(--lr));border-radius:2px;margin-top:5px;}
    
    header{background:var(--s);border-bottom:1px solid var(--b);padding:10px 14px 8px;position:sticky;top:0;z-index:100;}
    .h-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
    .h-pair{font-size:15px;font-weight:800;color:var(--lg);}
    .h-clock{font-size:11px;color:var(--m);font-family:'Space Mono',monospace;}

    .tfs{display:flex;gap:4px;}
    .tf{flex:1;padding:5px 0;border-radius:5px;border:1px solid var(--b);background:transparent;color:var(--m);font-size:11px;font-family:'Space Mono',monospace;cursor:pointer;}
    .tf.active{background:var(--lg);border-color:var(--lg);color:#fff;}

    .page{padding:10px 12px 0;}
    .price-card{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:14px;margin-bottom:10px;}
    .pc-price{font-size:38px;font-weight:800;font-family:'Space Mono',monospace;color:var(--lw);}
    .pc-price.up{color:var(--lg);}.pc-price.dn{color:var(--lr);}
    .pc-price.flash{animation:priceFlash .3s ease;}

    .alert-screen{background:#050505;border:2px solid var(--b);border-radius:16px;padding:16px;position:relative;margin-bottom:10px;}
    .alert-screen.SELL{border-color:var(--lr);}
    .alert-screen.BUY{border-color:var(--lg);}
    
    .levels3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px;}
    .lv{background:#0d0d0d;border-radius:8px;padding:8px;text-align:center;}
    .lv-v{font-size:13px;font-weight:700;font-family:'Space Mono',monospace;}

    .chart-wrap{background:var(--s);border:1px solid var(--b);border-radius:12px;overflow:hidden;margin-bottom:10px;}
    .nav{position:fixed;bottom:0;left:0;right:0;background:var(--s);border-top:1px solid var(--b);display:flex;padding:6px 0 14px;z-index:1000;}
    .nb{flex:1;background:none;border:none;color:var(--m);font-size:10px;cursor:pointer;}
    .nb.active{color:var(--lg);}
    
    /* Risk Styles */
    .risk{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:12px;margin-bottom:10px;}
    .risk-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .risk-row input{flex:1;}
    .rr-v{font-weight:bold;color:var(--lg);}
</style>
</head>
<body>

<div class="brand">
    <div class="brand-name">IICON.DOCE</div>
    <div class="brand-stripe"></div>
</div>

<header>
    <div class="h-top">
        <div class="h-pair">XAU/USD LIVE</div>
        <div class="h-clock" id="clock">--:--:--</div>
    </div>
    <div class="tfs">
        <button class="tf active" onclick="setTF(this,'M15')">M15</button>
        <button class="tf" onclick="setTF(this,'H1')">H1</button>
        <button class="tf" onclick="setTF(this,'D1')">D1</button>
    </div>
</header>

<div class="page">
    <div class="price-card">
        <div class="pc-label" style="font-size:10px; color:gray">SPOT GOLD</div>
        <div class="pc-price" id="pc-price">$0.00</div>
        <div id="pc-change" style="font-size:12px">Cargando datos...</div>
    </div>

    <div class="alert-screen" id="alert-screen">
        <div id="as-main" style="text-align:center; font-weight:bold; font-size:20px">ANALIZANDO MERCADO...</div>
        <div class="levels3">
            <div class="lv"><div>ENTRADA</div><div class="lv-v" id="lv-entry">--</div></div>
            <div class="lv"><div>STOP</div><div class="lv-v" style="color:#C8102E" id="lv-sl">--</div></div>
            <div class="lv"><div>TARGET</div><div class="lv-v" style="color:#00A550" id="lv-tp">--</div></div>
        </div>
    </div>

    <div class="chart-wrap">
        <div id="tv-chart" style="height:400px"></div>
    </div>

    <div class="risk">
        <div class="risk-row"><label>Capital</label><input type="range" min="1000" max="50000" step="1000" value="10000" id="capital" oninput="calcRisk()"><span id="cap-out">$10,000</span></div>
        <div class="risk-row"><label>Riesgo %</label><input type="range" min="0.5" max="3" step="0.5" value="1" id="risk-pct" oninput="calcRisk()"><span id="risk-out">1%</span></div>
        <div style="display:flex; justify-content:space-around; margin-top:10px">
            <div class="rr-v" id="rr-loss">-$100</div>
            <div class="rr-v" id="rr-lots">0.10 Lotes</div>
        </div>
    </div>
</div>

<nav class="nav">
    <button class="nb active">ALERTA</button>
    <button class="nb">CONFLUENCIA</button>
    <button class="nb">RIESGO</button>
</nav>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
const TD_KEY = '38f4424f90b04cf4a38c57a7c12fd03e';
let currentPrice = 0;
let prevPrice = 0;

// 1. ACTUALIZACIÓN DE PRECIO REAL (CADA 2 SEG)
async function fetchPrice() {
    try {
        const response = await fetch(`https://api.twelvedata.com/price?symbol=XAU/USD&apikey=${TD_KEY}`);
        const data = await response.json();
        
        if (data.price) {
            prevPrice = currentPrice;
            currentPrice = parseFloat(data.price);
            
            const priceEl = document.getElementById('pc-price');
            priceEl.textContent = `$${currentPrice.toFixed(2)}`;
            
            // Animación y color
            priceEl.className = 'pc-price flash ' + (currentPrice >= prevPrice ? 'up' : 'dn');
            setTimeout(() => priceEl.classList.remove('flash'), 300);
            
            // Generar señal basada en este precio
            updateTradingLogic();
        }
    } catch (e) {
        console.error("Error de conexión:", e);
    }
}

// 2. LÓGICA DE TRADING LOCAL (Para que funcione siempre)
function updateTradingLogic() {
    // Ejemplo: Niveles de soporte/resistencia dinámicos basados en números redondos
    const entry = currentPrice;
    const isSell = currentPrice % 2 > 1; // Simulación de lógica
    
    const sl = isSell ? entry + 3.5 : entry - 3.5;
    const tp = isSell ? entry - 8.5 : entry + 8.5;
    
    document.getElementById('lv-entry').textContent = entry.toFixed(2);
    document.getElementById('lv-sl').textContent = sl.toFixed(2);
    document.getElementById('lv-tp').textContent = tp.toFixed(2);
    document.getElementById('as-main').textContent = isSell ? "⬇ OPORTUNIDAD VENTA" : "⬆ OPORTUNIDAD COMPRA";
    document.getElementById('as-main').style.color = isSell ? "#C8102E" : "#00A550";
}

// 3. GRÁFICO DE TRADINGVIEW
function initChart(interval = '15') {
    new TradingView.widget({
        "autosize": true,
        "symbol": "OANDA:XAUUSD",
        "interval": interval,
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "es",
        "toolbar_bg": "#f1f3f6",
        "enable_publishing": false,
        "hide_top_toolbar": false,
        "save_image": false,
        "container_id": "tv-chart",
        // Esta opción hace que el gráfico sea lo más "vivo" posible
        "watchlist": ["XAUUSD"],
        "details": true,
    });
}

function setTF(el, tf) {
    document.querySelectorAll('.tf').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    const map = {'M15': '15', 'H1': '60', 'D1': 'D'};
    initChart(map[tf]);
}

function calcRisk() {
    const cap = document.getElementById('capital').value;
    const pct = document.getElementById('risk-pct').value;
    
    document.getElementById('cap-out').textContent = `$${parseInt(cap).toLocaleString()}`;
    document.getElementById('risk-out').textContent = `${pct}%`;
    
    const loss = cap * (pct / 100);
    document.getElementById('rr-loss').textContent = `Pérdida: -$${loss.toFixed(0)}`;
    document.getElementById('rr-lots').textContent = `${(loss / 200).toFixed(2)} Lotes`;
}

function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString();
}

// ARRANQUE
initChart('15');
calcRisk();
setInterval(updateClock, 1000);
setInterval(fetchPrice, 2500); // 2.5 seg para no saturar la API gratuita
fetchPrice(); 
</script>
</body>
</html>
