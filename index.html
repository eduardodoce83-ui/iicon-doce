<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IICON.DOCE | ELITE TERMINAL</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #050505;
        --card: #0d0d0d;
        --border: #1a1a1a;
        --gold: #d4af37;
        --green: #00ff88;
        --red: #ff3b3b;
        --text: #e0e0e0;
        --muted: #666;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { 
        background: var(--bg); 
        color: var(--text); 
        font-family: 'Inter', sans-serif; 
        min-height: 100vh;
        overflow-x: hidden;
        padding-bottom: 80px;
    }

    /* Header Premium */
    header {
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border);
        background: rgba(5,5,5,0.8);
        backdrop-filter: blur(10px);
        sticky: top;
        z-index: 100;
    }
    .brand-logo { font-family: 'JetBrains Mono', monospace; font-weight: 800; letter-spacing: -1px; font-size: 1.2rem; color: var(--gold); }
    .status-pill { background: rgba(0,255,136,0.1); color: var(--green); padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; border: 1px solid rgba(0,255,136,0.2); }

    /* Price Section */
    .hero-price { text-align: center; padding: 40px 20px; }
    .price-label { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: var(--muted); margin-bottom: 10px; }
    .main-price { font-family: 'JetBrains Mono', monospace; font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; transition: color 0.3s; }

    /* Signal Card */
    .signal-card {
        margin: 0 20px 20px;
        padding: 20px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        position: relative;
        overflow: hidden;
    }
    .signal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .signal-title { font-weight: 700; font-size: 14px; }
    
    .grid-levels { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .level-item { background: #141414; padding: 12px; border-radius: 12px; border: 1px solid var(--border); }
    .level-label { font-size: 9px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; }
    .level-value { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; }

    /* Strategy Selector */
    .strategy-toggle {
        display: flex;
        background: #141414;
        margin: 0 20px 20px;
        padding: 4px;
        border-radius: 12px;
        border: 1px solid var(--border);
    }
    .st-btn {
        flex: 1;
        padding: 10px;
        border: none;
        background: none;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        border-radius: 8px;
        transition: 0.3s;
    }
    .st-btn.active { background: var(--border); color: var(--gold); }

    /* Chart Area */
    .chart-container { margin: 0 20px; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; height: 400px; }

    /* Risk Glass Card */
    .risk-card { margin: 20px; padding: 20px; background: linear-gradient(180deg, #0d0d0d 0%, #050505 100%); border: 1px solid var(--border); border-radius: 16px; }
    .slider { width: 100%; height: 4px; background: var(--border); -webkit-appearance: none; border-radius: 2px; margin: 15px 0; }
    .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--gold); border-radius: 50%; cursor: pointer; }

    /* Nav */
    nav { position: fixed; bottom: 0; width: 100%; background: rgba(5,5,5,0.9); backdrop-filter: blur(15px); border-top: 1px solid var(--border); display: flex; padding: 15px; z-index: 1000; }
    .nav-btn { flex: 1; text-align: center; color: var(--muted); font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .nav-btn.active { color: var(--gold); }

    /* Animations */
    .up { color: var(--green); }
    .dn { color: var(--red); }
    .pulse-glow { animation: glow 2s infinite; }
    @keyframes glow { 0% { box-shadow: 0 0 5px rgba(212,175,55,0.2); } 50% { box-shadow: 0 0 20px rgba(212,175,55,0.4); } 100% { box-shadow: 0 0 5px rgba(212,175,55,0.2); } }
</style>
</head>
<body>

<header>
    <div class="brand-logo">IICON.DOCE<span style="color:var(--text)">.</span></div>
    <div class="status-pill">LIVE FEED</div>
</header>

<div class="hero-price">
    <div class="price-label">XAUUSD Spot Gold</div>
    <div class="main-price" id="price">0000.00</div>
</div>

<div class="strategy-toggle">
    <button class="st-btn active" onclick="setMode('cons', this)">CONSERVADOR</button>
    <button class="st-btn" onclick="setMode('aggr', this)">AGRESIVO</button>
</div>

<div class="signal-card" id="card-bg">
    <div class="signal-header">
        <div class="signal-title" id="sig-text">ANALIZANDO FLUJO...</div>
        <div id="clock" style="font-size:10px; font-family:'JetBrains Mono'; color:var(--muted)">00:00</div>
    </div>
    <div class="grid-levels">
        <div class="level-item">
            <div class="level-label">Entrada</div>
            <div class="level-value" id="lv-e">--</div>
        </div>
        <div class="level-item">
            <div class="level-label">Stop Loss</div>
            <div class="level-value" style="color:var(--red)" id="lv-s">--</div>
        </div>
        <div class="level-item">
            <div class="level-label">Target</div>
            <div class="level-value" style="color:var(--green)" id="lv-t">--</div>
        </div>
    </div>
</div>

<div class="chart-container" id="tv-chart"></div>

<div class="risk-card">
    <div style="display:flex; justify-content:space-between; font-size:11px;">
        <span style="color:var(--muted)">GESTIÓN DE CAPITAL</span>
        <span id="risk-val" style="color:var(--gold)">$10,000 (1%)</span>
    </div>
    <input type="range" min="1000" max="50000" value="10000" class="slider" id="cap-slider" oninput="updateRisk()">
    <div style="display:flex; justify-content:space-between; font-family:'JetBrains Mono'; font-size:12px; font-weight:800;">
        <span id="loss-val" style="color:var(--red)">-$100</span>
        <span id="lots-val" style="color:var(--green)">0.05 LOTS</span>
    </div>
</div>

<nav>
    <div class="nav-btn active">Terminal</div>
    <div class="nav-btn">Análisis</div>
    <div class="nav-btn">Ajustes</div>
</nav>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let lastP = 0;
    let mode = 'cons'; // cons o aggr

    // 1. Inicializar Gráfico
    new TradingView.widget({
        "autosize": true,
        "symbol": "OANDA:XAUUSD",
        "interval": "15",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "es",
        "container_id": "tv-chart",
        "hide_top_toolbar": true,
        "save_image": false
    });

    // 2. Lógica de Modos
    function setMode(m, btn) {
        mode = m;
        document.querySelectorAll('.st-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateRisk();
    }

    // 3. Feed de Precio y Señal
    async function syncMarket() {
        try {
            const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
            const d = await r.json();
            const p = parseFloat(d.price);
            
            const pEl = document.getElementById('price');
            if(p > lastP) pEl.className = 'main-price up';
            else if(p < lastP) pEl.className = 'main-price dn';
            
            pEl.textContent = p.toFixed(2);
            lastP = p;
            
            generateEliteSignal(p);
        } catch(e) {}
    }

    function generateEliteSignal(p) {
        const dec = p % 1;
        const sigText = document.getElementById('sig-text');
        const card = document.getElementById('card-bg');
        
        // Parámetros según modo
        let sl_pips = mode === 'cons' ? 3.80 : 2.20;
        let ratio = mode === 'cons' ? 2.5 : 3.5; // Más ratio en agresivo pero stop más corto

        if (dec > 0.80) { // VENTA
            sigText.textContent = "⬇ SELL CONFIRMED";
            sigText.style.color = "var(--red)";
            card.style.borderColor = "rgba(255,59,59,0.3)";
            setLv(p, p + sl_pips, p - (sl_pips * ratio));
        } 
        else if (dec < 0.20) { // COMPRA
            sigText.textContent = "⬆ BUY CONFIRMED";
            sigText.style.color = "var(--green)";
            card.style.borderColor = "rgba(0,255,136,0.3)";
            setLv(p, p - sl_pips, p + (sl_pips * ratio));
        }
        else {
            sigText.textContent = "◆ WAITING FOR VOLATILITY";
            sigText.style.color = "var(--muted)";
            card.style.borderColor = "var(--border)";
        }
    }

    function setLv(e, s, t) {
        document.getElementById('lv-e').textContent = e.toFixed(2);
        document.getElementById('lv-s').textContent = s.toFixed(2);
        document.getElementById('lv-t').textContent = t.toFixed(2);
    }

    function updateRisk() {
        const cap = document.getElementById('cap-slider').value;
        const riskPct = mode === 'cons' ? 0.01 : 0.02; // 1% conservador, 2% agresivo
        
        document.getElementById('risk-val').textContent = `$${parseInt(cap).toLocaleString()} (${(riskPct*100)}%)`;
        
        const loss = cap * riskPct;
        const lots = mode === 'cons' ? (loss / 250) : (loss / 150);
        
        document.getElementById('loss-val').textContent = `-$${loss.toFixed(0)}`;
        document.getElementById('lots-val').textContent = `${lots.toFixed(2)} LOTS`;
    }

    setInterval(syncMarket, 2000);
    setInterval(() => {
        const n = new Date();
        document.getElementById('clock').textContent = n.getHours() + ":" + String(n.getMinutes()).padStart(2,'0');
    }, 1000);

    syncMarket();
    updateRisk();
</script>
</body>
</html>
