<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IICON.DOCE | GOLDEN TERMINAL</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@500;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #050505; --card: #0d0d0d; --border: #1a1a1a;
        --gold: #d4af37; --green: #00ff88; --red: #ff3b3b;
        --text: #e0e0e0; --muted: #666;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding-bottom: 60px; transition: background 0.5s; }

    /* --- CABECERA IICON.DOCE (Tu Diseño) --- */
    .brand-header { text-align: center; padding: 25px 20px 15px; background: rgba(5,5,5,0.95); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
    .brand-name { font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 2.2rem; color: var(--gold); letter-spacing: 2px; line-height: 1; }
    .brand-stripe { width: 280px; height: 3px; background: linear-gradient(90deg, #00A550 0%, #F5F5F5 50%, #C8102E 100%); border-radius: 2px; margin: 8px auto; }
    .brand-subtitle { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 4px; }

    /* Alerta Visual 7/7 */
    @keyframes alert-glow { 0%, 100% { background: #050505; } 50% { background: #1a1600; } }
    .golden-alert { animation: alert-glow 1s infinite; }

    /* Price Section */
    .hero-price { text-align: center; padding: 30px 0; }
    .price-main { font-family: 'JetBrains Mono', monospace; font-size: 3.8rem; font-weight: 800; letter-spacing: -3px; }

    /* CONFLUENCIA 7 FACTORES */
    .conf-card { margin: 0 20px 20px; padding: 25px; background: var(--card); border: 2px solid var(--border); border-radius: 20px; transition: 0.5s; text-align: center; }
    .conf-circle { width: 85px; height: 85px; border: 4px solid var(--border); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 15px; transition: 0.5s; }
    .conf-num { font-size: 26px; font-weight: 800; font-family: 'JetBrains Mono'; }
    
    .conf-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; text-align: left; margin-top: 15px; }
    .f-item { font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 6px; opacity: 0.4; transition: 0.3s; }
    .f-ok { color: var(--green); opacity: 1; font-weight: bold; }
    .f-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

    .grid-lv { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 0 20px 20px; }
    .lv-box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; text-align: center; }

    /* Chart */
    .chart-box { margin: 0 20px 20px; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; height: 480px; }

    /* Utility */
    .up { color: var(--green); } .dn { color: var(--red); }
    .power-high { border-color: var(--gold) !important; box-shadow: 0 0 30px rgba(212,175,55,0.2); }
</style>
</head>
<body id="main-body">

<div class="brand-header">
    <div class="brand-name">IICON.DOCE</div>
    <div class="brand-stripe"></div>
    <div class="brand-subtitle">XAU/USD · INTRADÍA PROFESIONAL</div>
</div>

<div class="hero-price">
    <div class="price-main" id="price">----.--</div>
    <div id="clock" style="font-family:'JetBrains Mono'; font-size:12px; color:var(--muted)">00:00:00</div>
</div>

<div class="conf-card" id="sig-card">
    <div class="conf-circle" id="circle">
        <span class="conf-num" id="conf-count">0/7</span>
        <span style="font-size:8px; color:var(--muted)">FACTORES</span>
    </div>
    <div id="sig-msg" style="font-weight:800; letter-spacing:2px; text-transform:uppercase; font-size:18px;">ANALIZANDO...</div>
    
    <div class="conf-list">
        <div class="f-item" id="f1"><div class="f-dot"></div> TENDENCIA EMA</div>
        <div class="f-item" id="f2"><div class="f-dot"></div> FUERZA RSI</div>
        <div class="f-item" id="f3"><div class="f-dot"></div> KILLZONE NY</div>
        <div class="f-item" id="f4"><div class="f-dot"></div> VOLUMEN</div>
        <div class="f-item" id="f5"><div class="f-dot"></div> NIVEL PSICO</div>
        <div class="f-item" id="f6"><div class="f-dot"></div> ACCIÓN PRECIO</div>
        <div class="f-item" id="f7"><div class="f-dot"></div> ESTRUCTURA</div>
    </div>
</div>

<div class="grid-lv">
    <div class="lv-box"><div style="font-size:8px;color:var(--muted)">ENTRY</div><div id="lv-e" style="font-weight:bold">--</div></div>
    <div class="lv-box"><div style="font-size:8px;color:var(--muted)">STOP</div><div id="lv-s" style="color:var(--red);font-weight:bold">--</div></div>
    <div class="lv-box"><div style="font-size:8px;color:var(--muted)">TARGET</div><div id="lv-t" style="color:var(--green);font-weight:bold">--</div></div>
</div>

<div class="chart-box" id="tv-chart"></div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let lastP = 0;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Gráfico con herramientas e indicadores desbloqueados
    new TradingView.widget({
        "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15", "theme": "dark",
        "style": "1", "locale": "es", "container_id": "tv-chart", "hide_top_toolbar": false,
        "studies": ["MASimple@tv-basicstudies", "RSI@tv-basicstudies"]
    });

    async function tick() {
        try {
            const r = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=PAXGUSDT');
            const d = await r.json();
            const p = parseFloat(d.lastPrice);
            const open = parseFloat(d.openPrice);

            const pEl = document.getElementById('price');
            pEl.textContent = p.toFixed(2);
            pEl.className = 'price-main ' + (p > lastP ? 'up' : 'dn');
            lastP = p;

            updateLogic(p, open, d);
        } catch(e) {}
    }

    function updateLogic(p, open, d) {
        let score = 0;
        let f = [false, false, false, false, false, false, false];
        const hr = new Date().getUTCHours();

        if (p > open) { f[0] = true; score++; } // Tendencia
        const rsiSim = (p - d.lowPrice) / (d.highPrice - d.lowPrice);
        if (rsiSim < 0.2 || rsiSim > 0.8) { f[1] = true; score++; } // RSI
        if (hr >= 13 && hr <= 21) { f[2] = true; score++; } // NY Killzone
        if (parseFloat(d.quoteVolume) > 1000000) { f[3] = true; score++; } // Vol
        const dec = p % 1;
        if (dec < 0.15 || dec > 0.85) { f[4] = true; score++; } // Psico
        if (Math.abs(parseFloat(d.priceChangePercent)) > 0.4) { f[5] = true; score++; } // Accion
        if (d.highPrice - d.lowPrice > 12) { f[6] = true; score++; } // Estructura

        render(score, f, p);
    }

    function render(s, f, p) {
        document.getElementById('conf-count').textContent = s + "/7";
        const body = document.getElementById('main-body');
        const card = document.getElementById('sig-card');
        const msg = document.getElementById('sig-msg');

        for(let i=0; i<7; i++) {
            document.getElementById('f'+(i+1)).className = f[i] ? 'f-item f-ok' : 'f-item';
        }

        if (s >= 7) {
            body.className = "golden-alert";
            card.className = "conf-card power-high";
            msg.textContent = "¡SEÑAL PERFECTA!";
            msg.style.color = "var(--gold)";
            beep();
        } else if (s >= 5) {
            body.className = "";
            card.className = "conf-card power-high";
            msg.textContent = "SEÑAL POTENTE";
            msg.style.color = "var(--green)";
        } else {
            body.className = "";
            card.className = "conf-card";
            msg.textContent = "BUSCANDO CONFLUENCIA";
            msg.style.color = "var(--muted)";
        }

        document.getElementById('lv-e').textContent = p.toFixed(2);
        document.getElementById('lv-s').textContent = (p > lastP ? p - 3 : p + 3).toFixed(2);
        document.getElementById('lv-t').textContent = (p > lastP ? p + 9 : p - 9).toFixed(2);
    }

    function beep() {
        let o = audioCtx.createOscillator();
        let g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = 800; g.gain.value = 0.05;
        o.start(); o.stop(audioCtx.currentTime + 0.2);
    }

    setInterval(tick, 2500); tick();
    setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
