<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>IICON.DOCE · BLACK GOLD</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000000; --s: #0a0a0a; --b: #1a1a1a;
  --gold: #FFD700; --green: #00E676; --red: #FF1744;
  --white: #ffffff; --muted: #444444;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--white); font-family: 'Space Mono', monospace; min-height: 100vh; overflow-x: hidden; }

/* ─── BRAND ─── */
.brand { display: flex; flex-direction: column; align-items: center; padding: 20px 0 10px; background: var(--bg); }
.brand-name { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--gold); letter-spacing: 6px; }
.brand-stripe { width: 100px; height: 1px; background: var(--gold); margin-top: 5px; opacity: 0.3; }

/* ─── HEADER ─── */
header { background: var(--bg); border-bottom: 1px solid var(--b); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
.h-pair { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; color: var(--gold); }
.h-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 10px var(--green); display: inline-block; margin-right: 6px; }

.page { padding: 12px; max-width: 1200px; margin: 0 auto; }
.card { background: var(--s); border: 1px solid var(--b); border-radius: 12px; padding: 15px; margin-bottom: 12px; }
.sec-title { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; border-left: 2px solid var(--gold); padding-left: 8px; }

/* ─── PRECIO & MONITOR ─── */
.grid-top { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.price-display { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -1px; }
.mon-main { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--muted); text-align: center; }
.buy-active { border: 1px solid var(--green); background: rgba(0, 230, 118, 0.05); color: var(--green) !important; }

/* ─── CHART (TRADINGVIEW) ─── */
.chart-container { height: 500px; border-radius: 12px; overflow: hidden; border: 1px solid var(--b); margin-bottom: 15px; }

/* ─── NIVELES ─── */
.nivel-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.nivel-line { flex: 1; height: 1px; background: var(--b); }
.nivel-line.active { background: var(--gold); height: 2px; }
.nivel-val { font-size: 11px; font-weight: 700; width: 60px; text-align: right; color: var(--muted); }
.nivel-val.active { color: var(--gold); }

@media (max-width: 768px) {
    .grid-top { grid-template-columns: 1fr; }
    .chart-container { height: 400px; }
}
</style>
</head>
<body>

<div class="brand">
  <div class="brand-name">IICON.DOCE</div>
  <div class="brand-stripe"></div>
</div>

<header>
  <div><div class="h-dot"></div><span class="h-pair">XAU/USD · LIVE SNIPER</span></div>
  <div id="clock" style="font-size:11px; color:var(--muted)">00:00:00</div>
</header>

<div class="page">
    
    <div class="grid-top">
        <div class="card">
            <div class="sec-title">PRECIO REAL</div>
            <div class="price-display" id="price">0000.00</div>
            <div id="change" style="font-size:10px; margin-top:4px; color:var(--muted)">Conectando...</div>
        </div>

        <div class="card" id="monitor" style="display:flex; flex-direction:column; justify-content:center; align-items:center;">
            <div class="mon-main" id="mon-text">SCANNING POI</div>
            <div id="mon-sub" style="font-size:8px; color:var(--muted); margin-top:5px; text-transform:uppercase;">Esperando Nivel Psicológico</div>
        </div>
    </div>

    <div class="chart-container">
        <div id="tradingview_widget" style="height: 100%; width: 100%;"></div>
    </div>

    <div class="grid-top">
        <div class="card">
            <div class="sec-title">NIVELES CADA 50 PTS</div>
            <div id="niveles-box"></div>
        </div>

        <div class="card">
            <div class="sec-title">PUNTOS DE ENTRADA</div>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:10px; text-align:center;">
                <div><div style="font-size:7px; color:var(--muted)">ENTRY</div><div id="val-e" style="font-weight:bold; font-size:14px;">--</div></div>
                <div><div style="font-size:7px; color:var(--red)">STOP</div><div id="val-s" style="font-weight:bold; font-size:14px; color:var(--red)">--</div></div>
                <div><div style="font-size:7px; color:var(--green)">TARGET</div><div id="val-t" style="font-weight:bold; font-size:14px; color:var(--green)">--</div></div>
            </div>
        </div>
    </div>

</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
let price = 0, lastPrice = 0;
const STEP = 50;

// 1. INICIALIZAR GRÁFICO TV
new TradingView.widget({
  "autosize": true,
  "symbol": "OANDA:XAUUSD",
  "interval": "15",
  "timezone": "Etc/UTC",
  "theme": "dark",
  "style": "1",
  "locale": "es",
  "toolbar_bg": "#000000",
  "enable_publishing": false,
  "hide_top_toolbar": false,
  "save_image": false,
  "container_id": "tradingview_widget"
});

// 2. MOTOR DE PRECIO REAL
function init() {
    const ws = new WebSocket('wss://stream.binance.com:9443/ws/paxgusdt@ticker');
    ws.onmessage = (e) => {
        const d = JSON.parse(e.data);
        price = parseFloat(d.c);
        const ch = parseFloat(d.P);
        
        const pEl = document.getElementById('price');
        pEl.textContent = price.toFixed(2);
        pEl.style.color = price > lastPrice ? 'var(--green)' : 'var(--red)';
        
        document.getElementById('change').textContent = (ch >= 0 ? '+' : '') + ch.toFixed(2) + '% HOY';
        
        updateLogic();
        lastPrice = price;
    };
    ws.onclose = () => setTimeout(init, 2000);
}

// 3. LÓGICA DE NIVELES Y SEÑALES
function updateLogic() {
    const base = Math.round(price / STEP) * STEP;
    const dist = Math.abs(price - base);
    const inZone = dist < 4.0;
    
    // UI Niveles
    let h = '';
    for(let i=1; i>=-1; i--) {
        const l = base + (i * STEP);
        const act = Math.abs(price - l) < 4.0;
        h += `<div class="nivel-row">
            <div class="nivel-line ${act?'active':''}"></div>
            <div class="nivel-val ${act?'active':''}">${l}</div>
        </div>`;
    }
    document.getElementById('niveles-box').innerHTML = h;

    // Monitor Señal
    const mon = document.getElementById('monitor');
    const monText = document.getElementById('mon-text');

    if (inZone && price > (base - 1)) {
        mon.className = 'card buy-active';
        monText.textContent = 'ORDER BUY NOW';
        monText.style.color = 'var(--green)';
        
        document.getElementById('val-e').textContent = price.toFixed(1);
        document.getElementById('val-s').textContent = (base - 15).toFixed(1);
        document.getElementById('val-t').textContent = (base + 50).toFixed(1);
    } else {
        mon.className = 'card';
        monText.textContent = 'SCANNING POI';
        monText.style.color = 'var(--muted)';
    }
}

setInterval(() => document.getElementById('clock').textContent = new Date().toLocaleTimeString('es-ES'), 1000);
init();
</script>
</body>
</html>
