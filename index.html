<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD SNIPER | IICON.DOCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap');
        body { background-color: #020408; font-family: 'Inter', sans-serif; color: #e2e8f0; overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .buy-active { background: linear-gradient(135deg, #064e3b 0%, #020408 100%); border: 2px solid #10b981; box-shadow: 0 0 40px rgba(16, 185, 129, 0.2); }
        .price-up { color: #10b981; transition: all 0.2s; }
        .price-down { color: #ef4444; transition: all 0.2s; }
        @keyframes pulse-gold { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .gold-dot { animation: pulse-gold 2s infinite; }
    </style>
</head>
<body class="p-2 md:p-4">

    <div class="max-w-7xl mx-auto space-y-4">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="md:col-span-2 glass p-5 rounded-3xl flex justify-between items-center">
                <div>
                    <h1 class="text-[10px] font-black tracking-[0.4em] text-yellow-500 uppercase">Precision Engine V3</h1>
                    <div class="flex items-center gap-3">
                        <span class="text-3xl font-black italic italic tracking-tighter text-white">XAUUSD <span class="text-yellow-500 underline">GOLD</span></span>
                        <span class="bg-green-500/10 text-green-500 text-[10px] px-2 py-1 rounded-md border border-green-500/20 font-bold gold-dot uppercase tracking-widest">Live Sync</span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-[10px] text-gray-500 block font-bold uppercase">Precio en Tiempo Real</span>
                    <span id="price-main" class="text-4xl font-black mono text-white tracking-tighter">0.00</span>
                </div>
            </div>

            <div class="glass p-5 rounded-3xl flex flex-col justify-center">
                <span class="text-[10px] text-gray-500 block font-bold uppercase mb-1 text-center text-yellow-500">Sesión de Mercado</span>
                <div id="session-tag" class="text-center text-xl font-bold italic tracking-widest uppercase">Cargando...</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
            
            <div class="space-y-4">
                <div class="glass p-5 rounded-3xl">
                    <h3 class="text-[10px] font-black text-gray-400 mb-4 uppercase tracking-widest border-b border-white/5 pb-2 italic">Niveles Psicológicos</h3>
                    <div id="levels-list" class="space-y-2">
                        </div>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-4">
                <div id="main-signal-box" class="glass p-8 rounded-[40px] flex flex-col items-center justify-center min-h-[350px] transition-all duration-500 relative">
                    
                    <div id="wait-ui" class="text-center space-y-4">
                        <div class="p-6 bg-white/5 rounded-full inline-block">
                            <i data-lucide="crosshair" class="w-12 h-12 text-gray-600 animate-spin-slow"></i>
                        </div>
                        <h2 class="text-2xl font-light text-gray-500 italic">Esperando <span class="text-white font-bold">Punto de Interés (POI)</span></h2>
                        <p class="text-xs text-gray-600 uppercase tracking-widest font-bold">Filtro de precisión: Activado</p>
                    </div>

                    <div id="buy-ui" class="hidden text-center space-y-6 w-full animate-in fade-in zoom-in duration-300">
                        <div class="inline-block bg-yellow-500 text-black px-4 py-1 rounded-md font-black text-xs uppercase italic tracking-tighter">Confirmación sniper detectada</div>
                        <h2 class="text-7xl font-black text-white italic tracking-tighter leading-none">BUY <span class="text-green-500">NOW</span></h2>
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 px-10">
                            <div class="bg-black/40 p-4 rounded-2xl border border-white/10">
                                <span class="text-[10px] text-gray-500 block font-bold">ENTRY</span>
                                <span id="val-entry" class="text-2xl font-black mono text-white">0.00</span>
                            </div>
                            <div class="bg-green-500/20 p-4 rounded-2xl border border-green-500/30">
                                <span class="text-[10px] text-green-500 block font-bold">TAKE PROFIT</span>
                                <span id="val-tp" class="text-2xl font-black mono text-green-400">0.00</span>
                            </div>
                            <div class="bg-red-500/20 p-4 rounded-2xl border border-red-500/30">
                                <span class="text-[10px] text-red-500 block font-bold">STOP LOSS</span>
                                <span id="val-sl" class="text-2xl font-black mono text-red-400">0.00</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="h-[550px] rounded-[40px] overflow-hidden border border-white/10 shadow-2xl">
                    <div id="tv_widget_container" style="height:100%; width:100%"></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="beep-buy" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let currentPrice = 0;
        let lastPrice = 0;
        const step = 50; // Nivel psicológico cada 50 pts (Ej: 2150, 2200, 2250)
        const precisionZone = 5.0; // Rango de cercanía al nivel (puntos)

        // 1. MOTOR DE PRECIO REAL ULTRA-SYNC
        function startEngine() {
            // Usamos el stream de Binance para velocidad extrema
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/paxgusdt@ticker');
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                currentPrice = parseFloat(data.c);
                updateUI();
                checkSignal();
                lastPrice = currentPrice;
            };

            ws.onclose = () => setTimeout(startEngine, 1000);
        }

        function updateUI() {
            const el = document.getElementById('price-main');
            el.innerText = currentPrice.toFixed(2);
            
            // Efecto visual de movimiento
            if (currentPrice > lastPrice) el.className = "text-4xl font-black mono tracking-tighter price-up";
            else if (currentPrice < lastPrice) el.className = "text-4xl font-black mono tracking-tighter price-down";

            // Lista de niveles
            const list = document.getElementById('levels-list');
            list.innerHTML = '';
            const base = Math.round(currentPrice / 50) * 50;

            [-100, -50, 0, 50, 100].forEach(offset => {
                const lvl = base + offset;
                const isNear = Math.abs(currentPrice - lvl) < precisionZone;
                list.innerHTML += `
                    <div class="flex justify-between items-center p-3 rounded-xl border ${isNear ? 'bg-yellow-500/20 border-yellow-500/50' : 'bg-white/5 border-transparent'}">
                        <span class="mono text-sm ${isNear ? 'text-yellow-400 font-bold' : 'text-gray-400'}">${lvl}</span>
                        <span class="text-[9px] font-black ${isNear ? 'text-yellow-500' : 'text-gray-700'} uppercase italic">${isNear ? 'Sniper Zone' : 'Ready'}</span>
                    </div>
                `;
            });
        }

        // 2. LÓGICA DE SEÑAL DE COMPRA (SNIPER)
        function checkSignal() {
            const baseLevel = Math.round(currentPrice / 50) * 50;
            const dist = Math.abs(currentPrice - baseLevel);
            
            const waitUI = document.getElementById('wait-ui');
            const buyUI = document.getElementById('buy-ui');
            const box = document.getElementById('main-signal-box');
            const beep = document.getElementById('beep-buy');

            // CONDICIÓN: Precio justo encima del nivel (Rebote confirmado)
            if (currentPrice > baseLevel && dist < 4.0) {
                if (buyUI.classList.contains('hidden')) {
                    beep.play().catch(() => {}); // Alerta sonora
                }
                waitUI.classList.add('hidden');
                buyUI.classList.remove('hidden');
                box.classList.add('buy-active');

                // Cálculo de TP/SL con ratio 1:3
                document.getElementById('val-entry').innerText = currentPrice.toFixed(2);
                document.getElementById('val-tp').innerText = (currentPrice + 40).toFixed(2);
                document.getElementById('val-sl').innerText = (baseLevel - 15).toFixed(2);
            } else {
                waitUI.classList.remove('hidden');
                buyUI.classList.add('hidden');
                box.classList.remove('buy-active');
            }
        }

        // 3. SESIÓN Y WIDGET
        function setSession() {
            const h = new Date().getUTCHours();
            const tag = document.getElementById('session-tag');
            if (h >= 13 && h < 22) { tag.innerText = "New York 🇺🇸"; tag.className = "text-center text-xl font-bold italic tracking-widest uppercase text-green-500"; }
            else if (h >= 7 && h < 16) { tag.innerText = "London 🇬🇧"; tag.className = "text-center text-xl font-bold italic tracking-widest uppercase text-blue-400"; }
            else { tag.innerText = "Asian Session ⛩️"; tag.className = "text-center text-xl font-bold italic tracking-widest uppercase text-yellow-600"; }
        }

        new TradingView.widget({
            "autosize": true,
            "symbol": "OANDA:XAUUSD",
            "interval": "15",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "es",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "container_id": "tv_widget_container"
        });

        lucide.createIcons();
        startEngine();
        setSession();
        setInterval(setSession, 60000);
    </script>
</body>
</html>
