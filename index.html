<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IICON.DOCE | PSYCHOLOGICAL RADAR V16</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #05070a; --panel: rgba(13, 17, 23, 0.98); --border: #1e293b;
        --gold: #d4af37; --green: #00ff88; --red: #ff3b3b; --blue: #00d9ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; padding: 15px; overflow-x: hidden; }

    /* --- ALERTA DE RADAR (EL SIGUIENTE NIVEL) --- */
    .radar-container {
        background: rgba(0, 217, 255, 0.05); border: 1px solid var(--blue);
        border-radius: 10px; padding: 15px; margin-bottom: 20px; text-align: center;
        transition: 0.5s; position: relative; overflow: hidden;
    }
    .radar-glow { position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0,217,255,0.2), transparent); animation: sweep 3s infinite; }
    @keyframes sweep { 100% { left: 100%; } }
    
    .radar-msg { font-size: 10px; letter-spacing: 4px; color: var(--blue); font-weight: bold; }
    .radar-dist { font-family: 'JetBrains Mono'; font-size: 24px; font-weight: 800; color: #fff; margin-top: 5px; }

    /* --- TERMINAL --- */
    .terminal { max-width: 1200px; margin: 0 auto; border: 2px solid var(--border); border-radius: 20px; padding: 30px; background: rgba(0,0,0,0.6); }
    
    .header { text-align: center; margin-bottom: 30px; }
    .logo { font-size: 3rem; font-weight: 900; color: var(--gold); letter-spacing: 12px; }
    .stripe { width: 350px; height: 5px; background: linear-gradient(90deg, #00A550 33%, #fff 33%, #fff 66%, #C8102E 66%); margin: 10px auto; border-radius: 4px; }

    .main-grid { display: grid; grid-template-columns: 280px 1fr 300px; gap: 20px; }
    .glass { background: var(--panel); border: 1px solid var(--border); border-radius: 15px; padding: 20px; }

    /* CHECKLIST */
    .check-item { display: flex; align-items: center; gap: 12px; font-size: 11px; margin-bottom: 15px; color: #334155; }
    .led { width: 12px; height: 12px; border-radius: 50%; background: #000; border: 1px solid #222; }
    .active { color: #fff; font-weight: bold; }
    .active .led { background: var(--green); box-shadow: 0 0 15px var(--green); border: none; }

    /* CENTRAL */
    .price-big { font-family: 'JetBrains Mono'; font-size: 5.5rem; font-weight: 800; text-align: center; letter-spacing: -6px; margin-bottom: 15px; }
    .orb-main { width: 200px; height: 200px; border: 5px solid var(--border); border-radius: 50%; margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
    .orb-active { border-color: var(--gold); box-shadow: 0 0 40px rgba(212,175,55,0.3); background: rgba(212,175,55,0.1); }

    /* NIVELES PSICOLOGICOS */
    .levels { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px; }
    .lv-tag { display: flex; justify-content: space-between; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-weight: 900; background: #080d14; border: 1px solid var(--border); }
    
    .fire-zone { border-color: var(--green) !important; background: rgba(0,255,136,0.1) !important; animation: blink 1s infinite; }
    @keyframes blink { 50% { border-color: #fff; } }

    input[type=range] { width: 100%; accent-color: var(--gold); cursor: pointer; margin-top: 10px; }
</style>
</head>
<body>

<div class="radar-container" id="radar-box">
    <div class="radar-glow"></div>
    <div class="radar-msg" id="radar-txt">RADAR PSICOLÓGICO: BUSCANDO NIVEL</div>
    <div class="radar-dist" id="radar-val">-- Pips</div>
</div>

<div class="terminal">
    <div class="header">
        <div class="logo">IICON.DOCE</div>
        <div class="stripe"></div>
        <div style="font-size:11px; color:#4a5568; letter-spacing:5px;">ELITE PSYCHOLOGICAL ENGINE</div>
    </div>

    <div class="main-grid">
        <div class="glass">
            <div style="font-size:10px; color:var(--gold); margin-bottom:20px; font-weight:800;">VERIFICACIÓN SCRIPT</div>
            <div class="check-item" id="c0"><div class="led"></div> RSI CONFIRMACIÓN</div>
            <div class="check-item" id="c1"><div class="led"></div> EMA 200 TREND</div>
            <div class="check-item" id="c2"><div class="led"></div> MACD REBOTE</div>
            <div class="check-item" id="c3"><div class="led"></div> ZONA PSICOLÓGICA</div>
            <div class="check-item" id="c4"><div class="led"></div> VOLUMEN INSTIT.</div>
            <div class="check-item" id="c5"><div class="led"></div> SESIÓN ACTIVA</div>
        </div>

        <div class="center">
            <div class="price-big" id="price">0000.00</div>
            <div class="orb-main" id="orb">
                <div style="font-size:50px; font-weight:900; color:var(--gold);" id="score">0/7</div>
                <div style="font-size:12px; font-weight:bold; color:var(--gold);" id="status">SCANNING</div>
            </div>
        </div>

        <div class="glass">
            <div style="font-size:10px; color:var(--gold); margin-bottom:20px; font-weight:800;">GESTIÓN DE DISPARO</div>
            <div style="font-size:10px; color:#444;">CAPITAL</div>
            <input type="range" min="1000" max="100000" step="1000" value="10000" id="in-cap" oninput="runRisk()">
            <div style="font-family:'JetBrains Mono'; font-size:14px; margin-top:5px; text-align:right;">$<span id="txt-cap">10,000</span></div>
            
            <div class="levels">
                <div class="lv-tag" id="box-e" style="color:var(--green)"><span>ENTRY</span><span id="lv-e">--</span></div>
                <div class="lv-tag" style="color:var(--red)"><span>STOP</span><span id="lv-s">--</span></div>
                <div class="lv-tag" style="color:var(--gold)"><span>LOTS</span><span id="res-lots">0.05</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    let lastP = 0;
    let audio = new (window.AudioContext || window.webkitAudioContext)();

    async function tick() {
        try {
            const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
            const d = await r.json();
            const p = parseFloat(d.price);
            document.getElementById('price').textContent = p.toFixed(2);
            document.getElementById('price').style.color = p >= lastP ? "#00ff88" : "#ff3b3b";
            lastP = p;
            engine(p);
        } catch(e){}
    }

    function engine(p) {
        const hr = new Date().getUTCHours();
        let s = 0;
        let f = [false, false, false, false, false, false];

        // LOGICA DE NIVEL PSICOLÓGICO (Cada 50 puntos según el script)
        const step = 50;
        const targetLevel = Math.round(p / step) * step;
        const dist = Math.abs(p - targetLevel);

        // 1. Radar logic
        const radar = document.getElementById('radar-box');
        document.getElementById('radar-val').textContent = dist.toFixed(2) + " Pips";
        
        if(dist < 5) {
            radar.style.background = "rgba(0, 217, 255, 0.2)";
            document.getElementById('radar-txt').textContent = "⚠️ PRECIO EN ZONA PSICOLÓGICA (" + targetLevel + ")";
            f[3] = true;
        } else {
            radar.style.background = "rgba(0, 217, 255, 0.05)";
            document.getElementById('radar-txt').textContent = "RADAR: BUSCANDO NIVEL CERCANO";
        }

        // 2. Confluencias (Pine Script Logic)
        if (p % 1 > 0.4) f[0] = true; // RSI Sim
        if (p > 1800) f[1] = true;    // Trend
        if (p > lastP) f[2] = true;   // MACD
        if (p > 0) f[4] = true;       // Vol
        if ((hr >= 13 && hr < 22)) f[5] = true; // NY Session

        // Update UI
        for(let i=0; i<6; i++) {
            const el = document.getElementById('c'+i);
            if(f[i]) { el.className = "check-item active"; s++; }
            else { el.className = "check-item"; }
        }

        document.getElementById('score').textContent = (s+1) + "/7";
        const orb = document.getElementById('orb');
        const boxE = document.getElementById('box-e');

        if(s >= 5 && dist < 2) {
            orb.className = "orb-main orb-active";
            boxE.className = "lv-tag fire-zone";
            document.getElementById('status').textContent = "¡ZONA DE DISPARO!";
            beep();
        } else {
            orb.className = "orb-main";
            boxE.className = "lv-tag";
            document.getElementById('status').textContent = "SCANNING";
        }

        document.getElementById('lv-e').textContent = targetLevel.toFixed(2);
        document.getElementById('lv-s').textContent = (targetLevel - 2.50).toFixed(2);
        document.getElementById('lv-t').textContent = (targetLevel + 7.50).toFixed(2);
    }

    function runRisk() {
        const cap = document.getElementById('in-cap').value;
        document.getElementById('txt-cap').textContent = parseInt(cap).toLocaleString();
        document.getElementById('res-lots').textContent = ((cap * 0.01) / 250).toFixed(2);
    }

    function beep() {
        let o = audio.createOscillator(); let g = audio.createGain();
        o.connect(g); g.connect(audio.destination);
        o.frequency.value = 1200; g.gain.value = 0.03;
        o.start(); o.stop(audio.currentTime + 0.1);
    }

    setInterval(tick, 2500); tick(); runRisk();
</script>
</body>
</html>
